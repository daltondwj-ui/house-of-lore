// Build TCGplayer search URL from card details
function tcgUrl(name,set,rarity,condition){
let q=name||””;
if(set&&set!==“Mixed”&&set!==“Other”) q+=” “+set;
if(rarity) q+=” “+rarity;
return “https://www.tcgplayer.com/search/lorcana/product?q=”+encodeURIComponent(q.trim())+”&view=grid”+(condition&&condition!==“Near Mint”?”&condition=”+encodeURIComponent(condition):””);
}

function App(){
const [tab,setTab]=useState(“scanner”);
const [inventory,setInventory]=useState(()=>loadLS(“hol-inventory-v2”,[{id:1,card:“Starter Collection”,set:“Mixed”,condition:“Near Mint”,rarity:””,inkColor:””,qty:1,buyCost:50,marketValue:70,status:“held”,buyDate:TODAY,sellDate:””,sellPrice:””,platform:“Local”,notes:“First collection purchase”,priceUpdated:TODAY,listingUrl:””}]));
const [toastMsg,setToastMsg]=useState(””);
const [pendingCards,setPendingCards]=useState([]);

useEffect(()=>saveLS(“hol-inventory-v2”,inventory),[inventory]);

const showToast=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(””),4000);};

const handleDealDone=newItems=>{
setInventory(prev=>[…prev,…newItems]);
showToast(“✦ “+newItems.length+” card”+(newItems.length!==1?“s”:””)+” added to Vault”);
setTab(“vault”);
};

const handleScannerAdd=card=>{
setPendingCards(prev=>[…prev,{…card,id:Date.now()+Math.random()}]);
showToast(“✦ “+card.name+” added to Quoter”);
setTab(“quoter”);
};

const clearPending=()=>setPendingCards([]);
const heldCount=inventory.filter(i=>i.status===“held”).length;

const TABS=[{key:“scanner”,label:“📷 Scanner”},{key:“quoter”,label:“✦ Quoter”},{key:“vault”,label:“⊞ Vault”}];

return e(“div”,{style:{minHeight:“100vh”,background:”#0e0b07”,color:”#e8dcc8”,fontFamily:”‘Crimson Pro’,Georgia,serif”,display:“flex”,flexDirection:“column”,maxWidth:700,margin:“0 auto”}},
e(“div”,{style:{background:“rgba(14,11,7,.97)”,backdropFilter:“blur(8px)”,borderBottom:`1px solid ${BD}`,padding:“12px 18px”,display:“flex”,alignItems:“center”,gap:12,position:“sticky”,top:0,zIndex:20}},
e(“div”,{className:“hol-float”},e(Logo,{size:40})),
e(“div”,null,
e(“div”,{style:{fontFamily:”‘Cinzel’,serif”,fontSize:16,fontWeight:700,color:P,letterSpacing:”.05em”,lineHeight:1}},“House of Lore”),
e(“div”,{style:{fontSize:10,color:”#5a4a30”,letterSpacing:”.16em”,textTransform:“uppercase”}},“Lorcana Tools”)
)
),
e(“div”,{style:{display:“flex”,borderBottom:`1px solid ${BD}`,background:“rgba(14,11,7,.6)”,position:“sticky”,top:64,zIndex:19}},
…TABS.map(({key,label})=>e(“button”,{key,onClick:()=>setTab(key),className:“hol-btn”,style:{flex:1,padding:“11px 4px”,background:“none”,border:“none”,borderBottom:tab===key?`2px solid ${P}`:“2px solid transparent”,color:tab===key?P:”#5a4a30”,fontFamily:”‘Cinzel’,serif”,fontSize:12,fontWeight:tab===key?700:400,letterSpacing:”.04em”,transition:“all .2s”,position:“relative”}},
label,
key===“vault”&&heldCount>0&&e(“span”,{style:{position:“absolute”,top:7,right:8,background:P,color:”#1a1208”,borderRadius:10,fontSize:9,fontWeight:700,padding:“1px 5px”,fontFamily:”‘Cinzel’,serif”}},heldCount),
key===“quoter”&&pendingCards.length>0&&e(“span”,{style:{position:“absolute”,top:7,right:8,background:”#4ade80”,color:”#0e0b07”,borderRadius:10,fontSize:9,fontWeight:700,padding:“1px 5px”,fontFamily:”‘Cinzel’,serif”}},pendingCards.length)
))
),
toastMsg&&e(“div”,{style:{position:“fixed”,bottom:24,left:“50%”,transform:“translateX(-50%)”,background:`linear-gradient(135deg,${P2},${P})`,color:”#1a1208”,borderRadius:12,padding:“11px 20px”,fontSize:13,fontWeight:700,fontFamily:”‘Cinzel’,serif”,zIndex:999,boxShadow:“0 4px 20px rgba(0,0,0,.5)”,whiteSpace:“nowrap”,pointerEvents:“none”}},toastMsg),
e(“div”,{style:{flex:1,padding:tab===“scanner”?“0 0 48px”:“16px 16px 48px”,overflowX:“hidden”}},
tab===“scanner”&&e(ScannerTab,{onAddToQuoter:handleScannerAdd}),
tab===“quoter”&&e(QuoterTab,{onDealDone:handleDealDone,externalCards:pendingCards,clearExternal:clearPending}),
tab===“vault”&&e(VaultTab,{items:inventory,setItems:setInventory})
),

);
}

</script>
